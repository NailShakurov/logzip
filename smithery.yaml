build:
  dockerfile: Dockerfile

startCommand:
  type: stdio
  commandFunction: |-
    (config) => ({
      command: "logzip",
      args: ["mcp", ...(config.allowDirs || []).flatMap(d => ["--allow-dir", d])]
    })

configSchema:
  type: object
  properties:
    allowDirs:
      type: array
      items:
        type: string
      title: "Allowed directories"
      description: "Paths logzip-mcp can read. Leave empty to allow CWD only."
